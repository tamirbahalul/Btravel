<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Btravel</title>
    <link rel="stylesheet" type="text/css" href="../css/style2.css">
    <link rel="icon" href="../img/istockphoto-840458514-612x612.png">
    <script>
        function login(){ 
            var eamil = document.getElementById("eamil").value;
            var name = document.getElementById("name").value;
            var password = document.getElementById("password").value;
            if(password == "" || name == "" || eamil == ""){
                window.location.href="HomePage.html";              
            }
            alert("Invalid Information");
            
        }
    </script>
</head>

<body>
    <div id="navbar">
        <div id="maindiv">
            <div id="header">
                <h1 style="margin-bottom: 0;">Create Account</h1>
                <div id="faceGoogDiv">
                    <button id="goo">Sign Up with Google</button>
                    <button id="fac">Sign Up with Facebook</button>
                </div>
                <h3>-OR-</h3>
            </div>
            <div id="downHeaderDiv">
                <div class="login2">
                    <form>
                        <input type="text" id="name" placeholder="Full Name">
                        <input type="text" id="eamil" placeholder="Email Address">
                        <input type="password" id="password" placeholder="Password">
                        <button id="cac" onclick="login();">Create Account</button>
                    </form>
                </div>
                <div id="login3">
                    <p>
                        Already have an account?<a href="loginPage.php">login</a>
                    </p>
                </div>
            </div>   
        </div>
        <div id="logo">
            <h1 class="wtext">Btravel</h1>
            <p class="wtext">find your best attraction in israel</p>
            <img id="flagimg" src="../img/israel.jpg">
        </div>    
    </div>
    

</body>

</html>
